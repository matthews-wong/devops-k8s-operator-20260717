apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: pings.operators.example.com
spec:
  group: operators.example.com
  names:
    kind: Ping
    listKind: PingList
    plural: pings
    singular: ping
  scope: Namespaced
  versions:
    - name: v1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              properties:
                message:
                  type: string
                  minLength: 1
                  maxLength: 140
                intervalSeconds:
                  type: integer
                  minimum: 1
                  maximum: 3600
                  default: 30
              x-kubernetes-validations:
                - rule: "self.intervalSeconds >= 1 && self.intervalSeconds <= 3600"
                  message: "intervalSeconds must be between 1 and 3600"
            status:
              type: object
              properties:
                lastPinged:
                  type: string
                pingCount:
                  type: integer
      additionalPrinterColumns:
        - name: Message
          type: string
          jsonPath: .spec.message
        - name: LastPinged
          type: string
          jsonPath: .status.lastPinged
