apiVersion: v1
kind: ServiceAccount
metadata:
  name: devops-k8s-operator
  namespace: devops-k8s-operator-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: devops-k8s-operator-manager-role
rules:
  - apiGroups: ["operators.example.com"]
    resources: ["pings"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["operators.example.com"]
    resources: ["pings/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["operators.example.com"]
    resources: ["pings/finalizers"]
    verbs: ["update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: devops-k8s-operator-manager-rolebinding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: devops-k8s-operator-manager-role
subjects:
  - kind: ServiceAccount
    name: devops-k8s-operator
    namespace: devops-k8s-operator-system
