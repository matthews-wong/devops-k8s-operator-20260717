apiVersion: v1
kind: Namespace
metadata:
  name: devops-k8s-operator-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-k8s-operator-controller-manager
  namespace: devops-k8s-operator-system
  labels:
    app.kubernetes.io/name: devops-k8s-operator
    app.kubernetes.io/managed-by: kustomize
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: devops-k8s-operator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: devops-k8s-operator
    spec:
      serviceAccountName: devops-k8s-operator
      securityContext:
        runAsNonRoot: true
      containers:
        - name: manager
          image: ghcr.io/matthews-wong/devops-k8s-operator:latest
          args:
            - --leader-elect
          ports:
            - containerPort: 8080
              name: metrics
            - containerPort: 8081
              name: health
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            limits:
              cpu: 200m
              memory: 128Mi
            requests:
              cpu: 100m
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
